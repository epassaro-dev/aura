name: iOS Tests

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-test.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-15

    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project Aura.xcodeproj \
            -scheme AuraTests \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath TestResults/UnitTests.xcresult \
            | xcpretty --color --report junit --output TestResults/unit-tests.xml \
            && exit ${PIPESTATUS[0]}

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ios/TestResults/
          retention-days: 14

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    # UI tests take longer; run in parallel but don't block merges.
    needs: unit-tests

    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project Aura.xcodeproj \
            -scheme AuraUITests \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath TestResults/UITests.xcresult \
            | xcpretty --color --report junit --output TestResults/ui-tests.xml \
            && exit ${PIPESTATUS[0]}

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: ios/TestResults/
          retention-days: 14
