name: iOS Build & Test

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: SwiftLint
        run: |
          brew list swiftlint >/dev/null 2>&1 || brew install swiftlint
          cd ios && swiftlint lint --strict --reporter github-actions-logging

      - name: Build and Test
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/Aura.xcodeproj \
            -scheme Aura \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify --renderer github-actions
